<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godding</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
    background: #0e0e0e;
    color: #ccc;
    min-height: 100vh;
}

.page {
    max-width: 620px;
    margin: 0 auto;
    padding: 24px 16px;
}

h1 {
    text-align: center;
    font-size: 24px;
    color: #fff;
    margin-bottom: 4px;
}
.tagline {
    text-align: center;
    color: #777;
    font-size: 14px;
    margin-bottom: 28px;
}

/* ── Cards ── */
.card {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
}
.card h2 {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 12px;
    font-weight: 500;
}

/* ── Input row ── */
.input-row {
    display: flex;
    gap: 8px;
}
.input-row input {
    flex: 1;
    padding: 12px 14px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #ddd;
    font-size: 16px;
    outline: none;
}
.input-row input:focus { border-color: #4a90d9; }
.input-row input::placeholder { color: #555; }
.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    color: #ddd;
    background: #2a2a2a;
}
.btn:hover { background: #3a3a3a; }
.btn-blue { background: #1d3557; }
.btn-blue:hover { background: #264a73; }
.btn-green { background: #1a3a2a; }
.btn-green:hover { background: #245038; }

/* ── Status bar ── */
.status {
    text-align: center;
    padding: 14px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
}
.status.fair {
    background: #0f2a1a;
    border: 1px solid #2a5a3a;
    color: #4ade80;
}
.status.unfair {
    background: #2a1515;
    border: 1px solid #5a2a2a;
    color: #f0a0a0;
}
.status.empty {
    background: #181818;
    border: 1px solid #2a2a2a;
    color: #666;
}

/* ── Canvas ── */
.canvas-wrap {
    background: #0a0a0a;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
}
canvas {
    display: block;
    width: 100%;
    height: 400px;
    cursor: grab;
}
canvas:active { cursor: grabbing; }
.canvas-hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: #444;
    font-size: 12px;
    pointer-events: none;
}
.connect-bar {
    display: none;
    text-align: center;
    padding: 12px;
    background: #1a3a2a;
    border: 1px solid #4ade80;
    border-radius: 14px;
    margin-bottom: 16px;
    color: #4ade80;
    font-size: 14px;
}

/* ── Detail ── */
.detail {
    display: none;
}
.detail .name { font-size: 18px; color: #fff; margin-bottom: 4px; }
.detail .desc { color: #888; margin-bottom: 10px; font-size: 14px; }
.detail .conn { color: #777; font-size: 14px; line-height: 1.7; }
.detail .conn b { color: #bbb; font-weight: 500; }

/* ── Footer ── */
footer {
    text-align: center;
    color: #444;
    font-size: 12px;
    padding: 16px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="page">

<h1>Godding</h1>
<p class="tagline">The hand that gives is connected to the hand that receives.</p>

<div class="status empty" id="status">Add something to begin</div>

<div class="card">
    <h2>Add something</h2>
    <div class="input-row">
        <input type="text" id="name" placeholder="What is it?" autocomplete="off">
        <button class="btn btn-blue" onclick="add()">Add</button>
    </div>
</div>

<div class="connect-bar" id="connectBar">Click two circles to connect them</div>

<div class="card">
    <h2>Your tree</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-green" id="connectBtn" onclick="startConnect()">Connect</button>
    </div>
    <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="canvas-hint" id="hint">Click any circle to see it. Drag to move.</div>
    </div>
</div>

<div class="card detail" id="detail">
    <div class="name" id="dName"></div>
    <div class="desc" id="dDesc"></div>
    <div class="conn" id="dConn"></div>
</div>

<footer>
    Everything stays in your browser. Nothing is sent anywhere.<br>
    Fair for all.
</footer>

</div>
<script>
// ── Storage ──
const KEY = 'godding';
const seed = {nextId:7, nodes:[
    {id:1, name:'You', desc:'The one reading this'},
    {id:2, name:'Someone else', desc:'Anyone in the world'},
    {id:3, name:'An idea', desc:'Something you want to understand'},
    {id:4, name:'A question', desc:'Something you want to ask'},
    {id:5, name:'Kindness', desc:'The simplest connection'},
    {id:6, name:'Understanding', desc:'What comes after'}
], edges:[
    {from:1,to:5},{from:2,to:5},
    {from:5,to:6},
    {from:6,to:3},{from:6,to:4},
    {from:3,to:1},{from:4,to:2}
]};

function load() {
    try {
        const d = JSON.parse(localStorage.getItem(KEY));
        if (d && d.nodes && d.nodes.length > 0) return d;
        return JSON.parse(JSON.stringify(seed));
    } catch { return JSON.parse(JSON.stringify(seed)); }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

// ── State ──
let pos = {};
let drag = null, dragOff = {x:0,y:0}, dragMoved = false;
let connecting = false, connectFrom = null;

// ── Actions ──
function add() {
    const inp = document.getElementById('name');
    const name = inp.value.trim();
    if (!name) return;
    const d = load();
    d.nodes.push({id: d.nextId++, name, desc: null});
    save(d);
    inp.value = '';
    render();
}

function startConnect() {
    connecting = !connecting;
    connectFrom = null;
    document.getElementById('connectBtn').textContent = connecting ? 'Cancel' : 'Connect';
    document.getElementById('connectBar').style.display = connecting ? 'block' : 'none';
    document.getElementById('connectBar').textContent = 'Click two circles to connect them';
    render();
}

function doConnect(nodeId) {
    if (!connectFrom) {
        connectFrom = nodeId;
        const d = load();
        const n = d.nodes.find(x => x.id === nodeId);
        document.getElementById('connectBar').textContent = `Now click what "${n.name}" connects to`;
        render();
        return;
    }
    if (nodeId === connectFrom) return;
    const d = load();
    if (!d.edges.some(e => e.from === connectFrom && e.to === nodeId)) {
        d.edges.push({from: connectFrom, to: nodeId});
        save(d);
    }
    connecting = false;
    connectFrom = null;
    document.getElementById('connectBtn').textContent = 'Connect';
    document.getElementById('connectBar').style.display = 'none';
    render();
}

// ── Render ──
function render() {
    const d = load();
    updateStatus(d);
    draw(d);
}

function updateStatus(d) {
    const el = document.getElementById('status');
    if (d.nodes.length === 0) {
        el.textContent = 'Add something to begin';
        el.className = 'status empty';
        return;
    }
    const linked = new Set();
    d.edges.forEach(e => { linked.add(e.from); linked.add(e.to); });
    const alone = d.nodes.filter(n => !linked.has(n.id));
    if (alone.length === 0) {
        el.textContent = 'Fair for all — everything is connected';
        el.className = 'status fair';
    } else if (d.nodes.length === 1) {
        el.textContent = 'One thing so far. Add more and connect them.';
        el.className = 'status empty';
    } else {
        const names = alone.map(n => n.name);
        if (names.length <= 2) {
            el.textContent = names.join(' and ') + ' — not connected yet';
        } else {
            el.textContent = names.length + ' things not connected yet';
        }
        el.className = 'status unfair';
    }
}

function draw(d) {
    const canvas = document.getElementById('c');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;

    if (d.nodes.length === 0) {
        document.getElementById('hint').textContent = 'Add something above to see it here.';
        return;
    }
    document.getElementById('hint').textContent = connecting
        ? 'Click a circle to start the connection'
        : 'Click any circle to see it. Drag to move.';

    // Init positions
    d.nodes.forEach((n, i) => {
        if (!pos[n.id]) {
            const a = (i / d.nodes.length) * Math.PI * 2 - Math.PI/2;
            const r = 60 + d.nodes.length * 14;
            pos[n.id] = {x: W/2 + Math.cos(a)*r, y: H/2 + Math.sin(a)*r};
        }
    });

    // Physics
    for (let t = 0; t < 40; t++) {
        d.nodes.forEach(a => {
            if (drag && a.id === drag.id) return;
            let fx = 0, fy = 0;
            const pa = pos[a.id];
            d.nodes.forEach(b => {
                if (a.id === b.id) return;
                const pb = pos[b.id];
                let dx = pb.x-pa.x, dy = pb.y-pa.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
                fx -= dx/dist * 2500/(dist*dist);
                fy -= dy/dist * 2500/(dist*dist);
            });
            d.edges.forEach(e => {
                let oid = e.from===a.id ? e.to : e.to===a.id ? e.from : null;
                if (!oid || !pos[oid]) return;
                let dx = pos[oid].x-pa.x, dy = pos[oid].y-pa.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
                fx += dx/dist * (dist-90) * 0.04;
                fy += dy/dist * (dist-90) * 0.04;
            });
            fx += (W/2 - pa.x) * 0.004;
            fy += (H/2 - pa.y) * 0.004;
            pa.x = Math.max(30, Math.min(W-30, pa.x + fx*0.25));
            pa.y = Math.max(30, Math.min(H-30, pa.y + fy*0.25));
        });
    }

    ctx.clearRect(0,0,W,H);
    const R = 24;

    // Edges
    d.edges.forEach(e => {
        const a = pos[e.from], b = pos[e.to];
        if (!a || !b) return;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
        const ang = Math.atan2(b.y-a.y, b.x-a.x);
        const ax = b.x - Math.cos(ang)*R, ay = b.y - Math.sin(ang)*R;
        ctx.beginPath(); ctx.moveTo(ax,ay);
        ctx.lineTo(ax-Math.cos(ang-0.35)*8, ay-Math.sin(ang-0.35)*8);
        ctx.lineTo(ax-Math.cos(ang+0.35)*8, ay-Math.sin(ang+0.35)*8);
        ctx.closePath(); ctx.fillStyle='#444'; ctx.fill();
    });

    // Nodes
    const linked = new Set();
    d.edges.forEach(e => { linked.add(e.from); linked.add(e.to); });

    d.nodes.forEach(n => {
        const p = pos[n.id]; if (!p) return;
        const orphan = !linked.has(n.id) && d.nodes.length > 1;
        const isConnectFrom = connecting && connectFrom === n.id;

        // Glow
        if (orphan) {
            ctx.beginPath(); ctx.arc(p.x,p.y,R+8,0,Math.PI*2);
            ctx.fillStyle='rgba(240,160,160,0.08)'; ctx.fill();
        }
        if (isConnectFrom) {
            ctx.beginPath(); ctx.arc(p.x,p.y,R+8,0,Math.PI*2);
            ctx.fillStyle='rgba(74,222,128,0.12)'; ctx.fill();
        }

        ctx.beginPath(); ctx.arc(p.x,p.y,R,0,Math.PI*2);
        ctx.fillStyle = orphan ? '#251515' : '#152535';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = orphan ? '#c07070' : isConnectFrom ? '#4ade80' : '#4a90d9';
        ctx.stroke();

        ctx.fillStyle = '#ccc';
        ctx.font = '11px -apple-system, system-ui, sans-serif';
        ctx.textAlign = 'center';
        const words = n.name.split(' ');
        if (n.name.length <= 12) {
            ctx.fillText(n.name, p.x, p.y + R + 15);
        } else {
            const mid = Math.ceil(words.length/2);
            ctx.fillText(words.slice(0,mid).join(' '), p.x, p.y+R+13);
            if (words.length > 1)
                ctx.fillText(words.slice(mid).join(' '), p.x, p.y+R+25);
        }
    });
}

function nodeAt(cx, cy) {
    const d = load();
    const rect = document.getElementById('c').getBoundingClientRect();
    const x = cx - rect.left, y = cy - rect.top;
    for (let i = d.nodes.length-1; i >= 0; i--) {
        const p = pos[d.nodes[i].id]; if (!p) continue;
        if ((x-p.x)**2 + (y-p.y)**2 < 24*24) return d.nodes[i];
    }
    return null;
}

function showDetail(node) {
    const d = load();
    const el = document.getElementById('detail');
    el.style.display = 'block';
    el.className = 'card detail';
    document.getElementById('dName').textContent = node.name;
    document.getElementById('dDesc').textContent = node.desc || '';

    const givesTo = d.edges.filter(e => e.from===node.id)
        .map(e => d.nodes.find(n => n.id===e.to)?.name).filter(Boolean);
    const getsFrom = d.edges.filter(e => e.to===node.id)
        .map(e => d.nodes.find(n => n.id===e.from)?.name).filter(Boolean);

    let h = '';
    if (givesTo.length) h += `Gives to <b>${givesTo.join('</b>, <b>')}</b><br>`;
    if (getsFrom.length) h += `Receives from <b>${getsFrom.join('</b>, <b>')}</b>`;
    if (!givesTo.length && !getsFrom.length) h = 'Not connected to anything yet. Click Connect above.';
    document.getElementById('dConn').innerHTML = h;
}

// ── Events ──
const c = document.getElementById('c');

c.addEventListener('mousedown', e => {
    const n = nodeAt(e.clientX, e.clientY);
    if (n) {
        if (connecting) { doConnect(n.id); return; }
        drag = n; dragMoved = false;
        const p = pos[n.id], rect = c.getBoundingClientRect();
        dragOff = {x: e.clientX-rect.left-p.x, y: e.clientY-rect.top-p.y};
    }
});
c.addEventListener('mousemove', e => {
    if (!drag) return;
    dragMoved = true;
    const rect = c.getBoundingClientRect();
    pos[drag.id] = {x: e.clientX-rect.left-dragOff.x, y: e.clientY-rect.top-dragOff.y};
    draw(load());
});
c.addEventListener('mouseup', () => {
    if (drag && !dragMoved) showDetail(drag);
    drag = null;
});
c.addEventListener('mouseleave', () => { drag = null; });

c.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0], n = nodeAt(t.clientX, t.clientY);
    if (n) {
        if (connecting) { doConnect(n.id); return; }
        drag = n; dragMoved = false;
        const p = pos[n.id], rect = c.getBoundingClientRect();
        dragOff = {x: t.clientX-rect.left-p.x, y: t.clientY-rect.top-p.y};
    }
}, {passive:false});
c.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drag) return;
    dragMoved = true;
    const t = e.touches[0], rect = c.getBoundingClientRect();
    pos[drag.id] = {x: t.clientX-rect.left-dragOff.x, y: t.clientY-rect.top-dragOff.y};
    draw(load());
}, {passive:false});
c.addEventListener('touchend', () => {
    if (drag && !dragMoved) showDetail(drag);
    drag = null;
});

document.getElementById('name').addEventListener('keydown', e => { if (e.key==='Enter') add(); });

render();
</script>
</body>
</html>
