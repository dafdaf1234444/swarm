<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godding</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f0eb;
    color: #3a3a3a;
    min-height: 100vh;
}
.page {
    max-width: 500px;
    margin: 0 auto;
    padding: 40px 20px;
}
h1 {
    text-align: center;
    font-size: 22px;
    font-weight: normal;
    margin-bottom: 4px;
}
.tagline {
    text-align: center;
    color: #999;
    font-size: 13px;
    font-style: italic;
    margin-bottom: 32px;
}

/* Status */
.status {
    text-align: center;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
}
.status.good { background: #e8f0e8; color: #4a6a4a; }
.status.needs { background: #f0e8e4; color: #7a5a4a; }
.status.empty { background: #eee8e0; color: #999; }

/* Add */
.add-box {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
}
.add-box input {
    flex: 1;
    padding: 12px;
    border: 1px solid #d5cfc5;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    background: #fff;
    color: #3a3a3a;
    outline: none;
}
.add-box input:focus { border-color: #b8a88a; }
.add-box input::placeholder { color: #ccc; }
.add-box button {
    padding: 12px 20px;
    border: 1px solid #d5cfc5;
    border-radius: 8px;
    background: #fff;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    color: #555;
}
.add-box button:hover { background: #f0ece5; }

/* Things */
.thing {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.thing .name {
    font-size: 16px;
    color: #2a2a2a;
    margin-bottom: 6px;
}
.thing .links {
    font-size: 13px;
    color: #999;
    line-height: 1.6;
}
.thing .links b {
    color: #666;
    font-weight: normal;
}
.thing .alone {
    color: #c09080;
    font-size: 13px;
    font-style: italic;
}

/* Connect */
.connect-area {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
    flex-wrap: wrap;
}
.connect-area select {
    padding: 6px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fafaf8;
    color: #555;
    outline: none;
    cursor: pointer;
}
.connect-area button {
    padding: 6px 12px;
    border: 1px solid #c5d5c5;
    border-radius: 6px;
    background: #edf5ed;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: #4a6a4a;
}
.connect-area button:hover { background: #e0ece0; }
.connect-area .arrow {
    color: #ccc;
    font-size: 14px;
}

.section-label {
    font-size: 12px;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
}

.divider {
    border: none;
    border-top: 1px solid #e8e4de;
    margin: 24px 0;
}

footer {
    text-align: center;
    color: #ccc;
    font-size: 11px;
    margin-top: 32px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="page">

<h1>Godding</h1>
<p class="tagline">The hand that gives is connected to the hand that receives.</p>

<div class="status empty" id="status">Write something below to begin.</div>

<div class="add-box">
    <input type="text" id="inp" placeholder="Something on your mind..." autocomplete="off">
    <button onclick="add()">Add</button>
</div>

<div id="connectBox" style="display:none">
    <div class="section-label">Connect</div>
    <div class="connect-area">
        <select id="fromSel"></select>
        <span class="arrow">&#8594;</span>
        <select id="toSel"></select>
        <button onclick="link()">Connect</button>
    </div>
    <hr class="divider">
</div>

<div class="section-label" id="listLabel" style="display:none">Everything</div>
<div id="list"></div>

<footer>
    Everything stays here in your browser.<br>
    Nothing is sent anywhere. Fair for all.
</footer>

</div>
<script>
const K = 'godding2';
const seed = {nextId: 4, nodes: [
    {id:1, name:'You'},
    {id:2, name:'Someone else'},
    {id:3, name:'Something in common'}
], edges: [
    {from:1, to:3},
    {from:2, to:3},
    {from:3, to:1},
    {from:3, to:2}
]};

function load() {
    try {
        const d = JSON.parse(localStorage.getItem(K));
        if (d && d.nodes && d.nodes.length > 0) return d;
        return JSON.parse(JSON.stringify(seed));
    } catch { return JSON.parse(JSON.stringify(seed)); }
}
function save(d) { localStorage.setItem(K, JSON.stringify(d)); }

function add() {
    const inp = document.getElementById('inp');
    const name = inp.value.trim();
    if (!name) return;
    const d = load();
    d.nodes.push({id: d.nextId++, name});
    save(d);
    inp.value = '';
    render();
}

function link() {
    const f = parseInt(document.getElementById('fromSel').value);
    const t = parseInt(document.getElementById('toSel').value);
    if (!f || !t || f === t) return;
    const d = load();
    if (d.edges.some(e => e.from === f && e.to === t)) return;
    d.edges.push({from: f, to: t});
    save(d);
    render();
}

function render() {
    const d = load();

    // Status
    const el = document.getElementById('status');
    if (d.nodes.length === 0) {
        el.textContent = 'Write something below to begin.';
        el.className = 'status empty';
    } else {
        const linked = new Set();
        d.edges.forEach(e => { linked.add(e.from); linked.add(e.to); });
        const alone = d.nodes.filter(n => !linked.has(n.id));
        if (alone.length === 0) {
            el.textContent = 'Everything is connected.';
            el.className = 'status good';
        } else if (d.nodes.length === 1) {
            el.textContent = 'One thing so far. Add another and connect them.';
            el.className = 'status empty';
        } else {
            const names = alone.map(n => '"' + n.name + '"');
            el.textContent = (names.length <= 3 ? names.join(' and ') : alone.length + ' things') + ' not connected yet.';
            el.className = 'status needs';
        }
    }

    // Connect selects
    const showConnect = d.nodes.length >= 2;
    document.getElementById('connectBox').style.display = showConnect ? 'block' : 'none';
    if (showConnect) {
        ['fromSel', 'toSel'].forEach(id => {
            const sel = document.getElementById(id);
            const old = sel.value;
            sel.innerHTML = '<option value="">pick...</option>';
            d.nodes.forEach(n => {
                const o = document.createElement('option');
                o.value = n.id; o.textContent = n.name;
                sel.appendChild(o);
            });
            sel.value = old;
        });
    }

    // List
    const list = document.getElementById('list');
    document.getElementById('listLabel').style.display = d.nodes.length > 0 ? 'block' : 'none';
    list.innerHTML = '';

    const linked = new Set();
    d.edges.forEach(e => { linked.add(e.from); linked.add(e.to); });

    d.nodes.forEach(n => {
        const div = document.createElement('div');
        div.className = 'thing';

        const givesTo = d.edges.filter(e => e.from === n.id)
            .map(e => d.nodes.find(x => x.id === e.to))
            .filter(Boolean).map(x => x.name);
        const getsFrom = d.edges.filter(e => e.to === n.id)
            .map(e => d.nodes.find(x => x.id === e.from))
            .filter(Boolean).map(x => x.name);

        let html = '<div class="name">' + esc(n.name) + '</div>';

        if (givesTo.length || getsFrom.length) {
            let parts = [];
            if (givesTo.length) parts.push('Gives to <b>' + givesTo.map(esc).join('</b>, <b>') + '</b>');
            if (getsFrom.length) parts.push('Receives from <b>' + getsFrom.map(esc).join('</b>, <b>') + '</b>');
            html += '<div class="links">' + parts.join('<br>') + '</div>';
        } else if (d.nodes.length > 1) {
            html += '<div class="alone">Not connected to anything yet.</div>';
        }

        div.innerHTML = html;
        list.appendChild(div);
    });
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
render();
</script>
</body>
</html>
