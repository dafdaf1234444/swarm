name: Auto-docs + Wiki
on:
  push:
    branches: [master, main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .
      - run: swarm docs --out docs
      - name: Commit docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "auto: regenerate docs"
          git push
      - name: Sync wiki
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki || exit 0
          cp -r docs/* wiki/ 2>/dev/null || true
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add . && (git diff --cached --quiet || git commit -m "auto: sync wiki") && git push || true
